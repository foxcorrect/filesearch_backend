server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/resume_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.resume.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  # 生产环境务必通过环境变量 JWT_SECRET 设置，不要使用默认值
  secret: ${JWT_SECRET:ResumeBackendJwtSecretKey2024MustBeAtLeast256BitsLongForHS256!!}
  expiration: ${JWT_EXPIRATION:86400000}

# PDF processing configuration
pdf:
  work-dir: ${PDF_WORK_DIR:/tmp/resume-pdf}
  fonts-dir: ${PDF_FONTS_DIR:C:/Windows/Fonts}
